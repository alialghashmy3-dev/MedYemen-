<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedYemen V2</title>  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f4f6;
      color: #222;
    }

    .container {
      width: 95%;
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .header {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      color: white;
      background: white;
      padding: 30px;
      border-radius: 20px;
      margin-top: 20px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    .header h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .header p {
      color: rgba(255,255,255,0.9);
      color: #666;
      margin-bottom: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      margin-top: 25px;
    }

    .card {
      border: 1px solid rgba(15,118,110,0.1);
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #0f766e, #0ea5a4);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .facility {
      background: #f8fafc;
      border: 1px solid #eee;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 15px;
    }

    .facility h3 {
      margin-bottom: 8px;
    }

    .facility p {
      color: #666;
      margin-bottom: 6px;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #0f766e, #0ea5a4);
      color: white;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .delete-btn {
      margin-top: 12px;
      background: linear-gradient(135deg, #dc2626, #ef4444);
    }

    .login-box {
      max-width: 400px;
      margin: 40px auto;
    }

    @media(max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 30px;
      }
    }
  </style></head>
<body><div class="container">  <div class="header">
    <h1>🏥 منصة ميد يمن V2</h1>
    <p>منصة صحية رقمية لإدارة وعرض المنشآت الطبية في اليمن</p>
    <p><strong>المؤسس: د. علي زيد الغشمي</strong></p>
    <p>📞 771441367</p>
  </div>  <div id="loginSection" class="login-box card">
    <h2 style="margin-bottom:20px; text-align:center;">لوحة تحكم الإدارة</h2><input type="text" id="username" placeholder="اسم المستخدم">
<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="login()">دخول لوحة التحكم</button>

  </div>  <div id="dashboard" style="display:none;"><div class="grid">

  <div class="card">
    <h2 style="margin-bottom:20px;">إضافة منشأة جديدة</h2>

    <input type="text" id="name" placeholder="اسم المنشأة">

    <input type="text" id="city" placeholder="المدينة">

    <select id="type">
      <option value="">نوع المنشأة</option>
      <option>مستشفى</option>
      <option>عيادة</option>
      <option>مختبر</option>
      <option>صيدلية</option>
      <option>بنك دم</option>
    </select>

    <input type="text" id="phone" placeholder="رقم التواصل">

    <button onclick="addFacility()">إضافة المنشأة</button>
  </div>

  <div class="card">
    <h2 style="margin-bottom:20px;">المنشآت الطبية</h2>

    <div id="facilities"></div>
  </div>

</div>

  </div></div><script>

  const facilitiesContainer = document.getElementById('facilities');

  let facilities = JSON.parse(localStorage.getItem('medyemenFacilities')) || [
    {
      name: 'مستشفى اليمن الدولي',
      city: 'تعز',
      type: 'مستشفى',
      phone: '777000111'
    }
  ];

  function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    if(username === 'admin' && password === '123456') {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderFacilities();
    } else {
      alert('بيانات الدخول غير صحيحة');
    }
  }

  function saveFacilities() {
    localStorage.setItem('medyemenFacilities', JSON.stringify(facilities));
  }

  function renderFacilities() {
    facilitiesContainer.innerHTML = '';

    facilities.forEach((facility, index) => {
      facilitiesContainer.innerHTML += `
        <div class="facility">
          <div class="badge">${facility.type}</div>
          <h3>${facility.name}</h3>
          <p>📍 ${facility.city}</p>
          <p>📞 ${facility.phone}</p>

          <button class="delete-btn" onclick="deleteFacility(${index})">
            حذف المنشأة
          </button>
        </div>
      `;
    });
  }

  function addFacility() {
    const name = document.getElementById('name').value;
    const city = document.getElementById('city').value;
    const type = document.getElementById('type').value;
    const phone = document.getElementById('phone').value;

    if(!name || !city || !type) {
      alert('يرجى تعبئة الحقول المطلوبة');
      return;
    }

    facilities.unshift({
      name,
      city,
      type,
      phone
    });

    saveFacilities();
    renderFacilities();

    document.getElementById('name').value = '';
    document.getElementById('city').value = '';
    document.getElementById('type').value = '';
    document.getElementById('phone').value = '';
  }

  function deleteFacility(index) {
    facilities.splice(index, 1);
    saveFacilities();
    renderFacilities();
  }

</script></body>
</html>
