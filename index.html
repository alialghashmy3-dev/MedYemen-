<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة صحية V4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Tajawal;background:#f5f7fb}
#map{height:45vh}

.container{padding:10px}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}

input,select,textarea{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:8px;font-size:16px}

button{
  width:100%;padding:12px;
  background:#1565c0;color:#fff;
  border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:16px
}
button:hover{background:#0d47a1}

.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.tab{display:none}
.active{display:block}

.small{font-size:12px;color:#666}
.hidden{display:none}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
</style>
</head>

<body>

<div id="map"></div>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>تسجيل الدخول</h3>
  <input id="email" placeholder="الإيميل" type="email">
  <input id="password" type="password" placeholder="كلمة المرور">
  <button onclick="login()">دخول</button>
  <p class="small">ملاحظة: لازم تنشئ مستخدم من Supabase > Authentication > Users > Add user</p>
</div>

<!-- APP -->
<div id="appBox" class="hidden">
  <div class="card header">
    <h3>مرحباً <span id="userEmail"></span></h3>
    <button onclick="logout()" style="width:auto;background:#c62828;padding:8px 15px">خروج</button>
  </div>

  <!-- NAV -->
  <div class="card">
    <div class="row">
      <button onclick="show('fac')">🏥 المنشآت</button>
      <button onclick="show('blood')">🩸 بنك الدم</button>
    </div>
    <div class="row">
      <button onclick="show('chat')">💬 الاستشارات</button>
      <button onclick="show('ai')">🤖 المساعد AI</button>
    </div>
  </div>

  <!-- FACILITIES -->
  <div id="fac" class="tab active card">
    <h3>إضافة منشأة على الخريطة</h3>
    <input id="name" placeholder="اسم المنشأة">
    <input id="type" placeholder="نوع: مستشفى، صيدلية، مركز صحي">
    <div class="row">
      <input id="lat" placeholder="خط العرض lat" type="number" step="0.0001">
      <input id="lng" placeholder="خط الطول lng" type="number" step="0.0001">
    </div>
    <button onclick="addFacility()">إضافة</button>
    <p class="small">إحداثيات صنعاء: lat=15.3694, lng=44.1910</p>
  </div>

  <!-- BLOOD -->
  <div id="blood" class="tab card">
    <h3>طلب دم عاجل</h3>
    <input id="bname" placeholder="اسم المريض">
    <input id="btype" placeholder="فصيلة الدم: A+, O-, B+">
    <input id="bcity" placeholder="المدينة">
    <input id="bphone" placeholder="رقم التواصل">
    <button onclick="addBlood()">إرسال الطلب</button>
    <hr>
    <h4>الطلبات المفتوحة</h4>
    <div id="bloodList"></div>
  </div>

  <!-- CHAT -->
  <div id="chat" class="tab card">
    <h3>استشارة طبيب</h3>
    <textarea id="msg" placeholder="اكتب حالتك أو سؤالك..." rows="3"></textarea>
    <button onclick="sendMsg()">إرسال</button>
    <hr>
    <div id="chatBox"></div>
  </div>

  <!-- AI -->
  <div id="ai" class="tab card">
    <h3>المساعد الطبي الذكي</h3>
    <textarea id="q" placeholder="اسأل عن الأعراض أو الدواء..." rows="3"></textarea>
    <button onclick="askAI()">اسأل الذكاء الاصطناعي</button>
    <div id="aiRes" style="margin-top:10px"></div>
  </div>
</div>

</div>

<script>
// 🔑 مفاتيح Supabase - جاهزة
const SUPABASE_URL = "https://vizedzonczytlswvcecm.supabase.co"
const SUPABASE_KEY = "sb_publishable_IHI2w7i_mEwCeX_8d-R7pw_Axf30Cp0"

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* MAP */
const map = L.map('map').setView([15.3694,44.1910],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let markers=[];

/* CHECK LOGIN ON START */
checkSession();

async function checkSession() {
  const { data: { session } = await supabase.auth.getSession();
  
  if (session) {
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('appBox').classList.remove('hidden');
    document.getElementById('userEmail').innerText = session.user.email;
    initApp();
  } else {
    document.getElementById('loginBox').classList.remove('hidden');
    document.getElementById('appBox').classList.add('hidden');
  }
}

/* LOGIN */
async function login(){
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });
  
  if (error) {
    alert("خطأ في الدخول: " + error.message);
    return;
  }
  
  checkSession();
}

/* LOGOUT */
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* INIT APP */
function initApp(){
  loadFacilities();
  loadBlood();
  loadChat();
  
  setInterval(()=>{
    loadBlood();
    loadChat();
  },5000);
}

/* NAV */
function show(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* FACILITIES */
async function addFacility(){
  if(!name.value || !lat.value || !lng.value) return alert('عبي كل الحقول');
  
  const {error} = await supabase.from('facilities').insert([{
    name: name.value,
    type: type.value,
    lat: Number(lat.value),
    lng: Number(lng.value)
  }]);
  
  if(error) return alert('خطأ: ' + error.message);
  
  name.value = type.value = lat.value = lng.value = '';
  loadFacilities();
  alert("تمت إضافة المنشأة");
}

async function loadFacilities(){
  const {data, error} = await supabase.from('facilities').select('*');
  if(error) return;

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  data.forEach(f=>{
    if(f.lat && f.lng) {
      const m = L.marker([f.lat,f.lng]).addTo(map).bindPopup(`<b>${f.name}</b><br>${f.type || ''}`);
      markers.push(m);
    }
  });
}

/* BLOOD */
async function addBlood(){
  if(!bname.value || !btype.value || !bphone.value) return alert('عبي الحقول المهمة');
  
  const {error} = await supabase.from('blood_requests').insert([{
    name: bname.value,
    blood_type: btype.value,
    city: bcity.value,
    phone: bphone.value,
    status: 'open'
  }]);
  
  if(error) return alert('خطأ: ' + error.message);
  
  bname.value = btype.value = bcity.value = bphone.value = '';
  loadBlood();
  alert("تم إرسال طلب الدم");
}

async function loadBlood(){
  const {data} = await supabase.from('blood_requests')
    .select('*').eq('status','open').order('created_at',{ascending:false});

  bloodList.innerHTML = data && data.length > 0 ? data.map(b=>
    `<div style="border-bottom:1px solid #eee;padding:8px 0">
      🩸 <b>${b.blood_type}</b> - ${b.name}<br>
      <span class="small">${b.city || 'غير محدد'} | ${b.phone}</span>
    </div>`
  ).join('') : '<p class="small">لا توجد طلبات مفتوحة</p>';
}

/* CHAT */
async function sendMsg(){
  if(!msg.value.trim()) return alert('اكتب سؤالك أول');
  
  const {error} = await supabase.from('consultations').insert([{
    message: msg.value,
    response: "بانتظار رد الطبيب..."
  }]);
  
  if(error) return alert('خطأ: ' + error.message);
  
  msg.value = '';
  loadChat();
}

async function loadChat(){
  const {data} = await supabase.from('consultations')
    .select('*').order('created_at',{ascending:false}).limit(20);

  chatBox.innerHTML = data && data.length > 0 ? data.map(c=>
    `<div style="margin:10px 0;padding:10px;background:#f8f9fa;border-radius:8px">
      <b>👤 أنت:</b> ${c.message}<br>
      <b>🤖 الرد:</b> ${c.response || '...' }
    </div>`
  ).join('') : '<p class="small">لا توجد استشارات بعد</p>';
}

/* AI */
async function askAI(){
  if(!q.value.trim()) return alert('اكتب سؤالك');
  aiRes.innerHTML = "🧠 جاري التفكير...";

  setTimeout(()=>{
    aiRes.innerHTML = `
      <div style="background:#e3f2fd;padding:12px;border-radius:8px">
        <b>تحليل أولي:</b> بناءً على وصفك للأعراض.<br>
        <b>نصيحة:</b> راقب حالتك. إذا استمرت الأعراض أكثر من 48 ساعة أو زادت حدتها، راجع أقرب مركز صحي فوراً.<br>
        <span class="small">* تنبيه: هذا رد آلي وليس تشخيص طبي معتمد</span>
      </div>
    `;
  },1200);
  q.value = '';
}
</script>

</body>
</html>
