<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MediYemen Health App</title>

<!-- PWA META -->
<meta name="theme-color" content="#0b5f5b" />
<meta name="description" content="منصة طبية متكاملة جاهزة كتطبيق" />
<link rel="manifest" href="data:application/manifest+json,{\"name\":\"MediYemen Health\",\"short_name\":\"MediYemen\",\"start_url\":\"./\",\"display\":\"standalone\",\"background_color\":\"#ffffff\",\"theme_color\":\"#0b5f5b\",\"icons\":[{\"src\":\"https://cdn-icons-png.flaticon.com/512/2966/2966327.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}]}" />

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{font-family:Arial;margin:0;background:#eef2f7;}
header{background:#0b5f5b;color:#fff;padding:16px;text-align:center;}
nav{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;background:#fff;padding:10px;position:sticky;top:0;z-index:10;}
nav button{border:0;padding:8px 10px;border-radius:8px;cursor:pointer;background:#e5e7eb;font-weight:bold;}
nav button.active{background:#0b5f5b;color:#fff;}
.container{max-width:1100px;margin:auto;padding:14px;}
.section{display:none;}
.section.active{display:block;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
.card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.title{font-weight:bold;margin-bottom:6px;}
.btn{display:block;margin-top:8px;padding:8px;background:#0b5f5b;color:#fff;border-radius:8px;text-align:center;border:none;cursor:pointer;width:100%;}
input{width:100%;padding:8px;margin:4px 0;border-radius:8px;border:1px solid #ddd;}
#map{height:380px;border-radius:12px;margin-top:10px;}
.footer{margin-top:20px;background:#0b5f5b;color:#fff;text-align:center;padding:14px;border-radius:12px;}
</style>
</head>
<body>

<header>
<h2>🏥 MediYemen Health App</h2>
<p>تطبيق طبي جاهز للنشر (PWA → متجر لاحقًا)</p>
</header>

<nav>
<button class="active" onclick="show('home')">الرئيسية</button>
<button onclick="show('dashboard')">لوحة التحكم</button>
<button onclick="show('mapSection')">الخريطة</button>
<button onclick="show('hospitals')">المستشفيات</button>
<button onclick="show('doctors')">الأطباء</button>
<button onclick="show('pharmacies')">الصيدليات</button>
<button onclick="show('labs')">المختبرات</button>
<button onclick="show('blood')">🩸 الدم</button>
</nav>

<div class="container">

<div id="home" class="section active">
<div class="card">
<h3>🚀 تطبيق طبي جاهز للنشر</h3>
<p>يمكن تثبيته على الهاتف مباشرة (Add to Home Screen)</p>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<div class="grid">
<div class="card">
<div class="title">إضافة مستشفى</div>
<input id="hName" placeholder="اسم">
<input id="hLat" placeholder="lat">
<input id="hLng" placeholder="lng">
<button class="btn" onclick="addHospital()">إضافة</button>
</div>

<div class="card">
<div class="title">إضافة طبيب</div>
<input id="dName" placeholder="اسم">
<input id="dSpec" placeholder="تخصص">
<button class="btn" onclick="addDoctor()">إضافة</button>
</div>

<div class="card">
<div class="title">إضافة صيدلية</div>
<input id="pName" placeholder="اسم">
<button class="btn" onclick="addPharmacy()">إضافة</button>
</div>

<div class="card">
<div class="title">إضافة مختبر</div>
<input id="lName" placeholder="اسم">
<button class="btn" onclick="addLab()">إضافة</button>
</div>

<div class="card">
<div class="title">بنك دم</div>
<input id="bName" placeholder="اسم">
<input id="bType" placeholder="فصائل">
<button class="btn" onclick="addBlood()">إضافة</button>
</div>
</div>
</div>

<div id="mapSection" class="section">
<h3>🗺️ الخريطة</h3>
<div id="map"></div>
</div>

<div id="hospitals" class="section"><div id="hospitalList" class="grid"></div></div>
<div id="doctors" class="section"><div id="doctorList" class="grid"></div></div>
<div id="pharmacies" class="section"><div id="pharmacyList" class="grid"></div></div>
<div id="labs" class="section"><div id="labList" class="grid"></div></div>
<div id="blood" class="section"><div id="bloodList" class="grid"></div></div>

</div>

<div class="footer">📱 جاهز للتحويل إلى APK عبر Capacitor أو Cordova</div>

<script>
const firebaseConfig={apiKey:"YOUR_API_KEY",databaseURL:"YOUR_DB_URL"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let map,markers=[];

function initMap(){
map=L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function addMarker(lat,lng,name){markers.push(L.marker([lat,lng]).addTo(map).bindPopup(name));}

function load(){

db.ref('hospitals').on('value',s=>{
let d=Object.values(s.val()||{});
hospitalList.innerHTML=d.map(i=>`<div class='card'><div class='title'>${i.name}</div></div>`).join('');
markers.forEach(m=>map.removeLayer(m));markers=[];
d.forEach(i=>i.lat&&i.lng?addMarker(i.lat,i.lng,i.name):0);
});

['doctors','pharmacies','labs','blood'].forEach(t=>{
let el=document.getElementById(t+'List');
db.ref(t).on('value',s=>{
el.innerHTML=Object.values(s.val()||{}).map(i=>`<div class='card'><div class='title'>${i.name}</div></div>`).join('');
});
});

}

function addHospital(){db.ref('hospitals').push({name:hName.value,lat:+hLat.value,lng:+hLng.value});}
function addDoctor(){db.ref('doctors').push({name:dName.value,spec:dSpec.value});}
function addPharmacy(){db.ref('pharmacies').push({name:pName.value});}
function addLab(){db.ref('labs').push({name:lName.value});}
function addBlood(){db.ref('blood').push({name:bName.value,type:bType.value});}

function show(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

setTimeout(()=>{initMap();load();},600);
</script>

</body>
</html>
